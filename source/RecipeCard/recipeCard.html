<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="recipeCard.js" type="module"></script>
    <script src="../LocalStorage/storage.js" type="module"></script>
    <title>Recipe Card</title>
</head>

<body>
    <div class="main-layout">
        <!-- LEFT COLUMN -->
        <div class="left-panel">
            <div class="search-section">
                <input id="search-input" type="search" placeholder="Search Recipes..." />
                <button id="search-btn">Search</button>
            </div>

            <h1>Create Recipe Card</h1>
            <form id="new-recipe">
                <label>
                    Name:
                    <input type="text" id="recipeName" required />
                </label>
                <label>
                    Author:
                    <input type="text" id="authorName" required />
                </label>
                <label>
                    Image:
                    <input type="file" id="image" accept="image/*" required />
                </label>
                <label>
                    Tags:
                    <select id="tagsDropdown">
                        <option value="">Select a Tag</option>
                        <option value="Easy">Easy</option>
                        <option value="Advanced">Advanced</option>
                        <option value="Pro">Pro</option>
                    </select>
                    <input type="text" id="customTag" placeholder="Custom Tag" />
                </label>
                <label>
                    Ingredients:
                    <textarea id="ingredients" required></textarea>
                </label>
                <label>
                    Steps:
                    <textarea id="steps" required></textarea>
                </label>
                <button type="submit">Create Recipe</button>
            </form>
        </div>

        <!-- MIDDLE COLUMN -->
        <div class="middle-panel">
            <button id="show-all-btn">Show All Recipes</button>

            <section id="meal-builder">
                <h2>Create Custom Meal</h2>
                <button id="start-meal-btn">Start Creating Meal</button>
                <div id="meal-creator" style="display: none;">
                    <input type="text" id="meal-name" placeholder="Enter meal name" required />
                    <button id="save-meal-btn">Save Meal</button>
                    <button id="save-edits-btn" style="display:none;">Save Changes</button>
                    
                    <label for="serving-size-dropdown">Serving Size:</label>
                        <select id="serving-size-dropdown">
                        <option value="" selected>Select...</option>
                        <option value="1">1 person</option>
                        <option value="2">2 people</option>
                        <option value="2-4">2–4 people</option>
                        <option value="4-6">4–6 people</option>
                        <option value="6+">6+ people</option>
                        <option value="custom">Custom</option>
                        </select>
                    <input type="text" id="custom-serving-size" placeholder="e.g. 2 adults + 3 kids" style="display: none;" />

                </div>
            </section>

            <section id="meals-display">
                <h2>Meals</h2>
                <div id="meal-list"></div>
            </section>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-panel">
            <main id="cardsContainer"></main>
        </div>
    </div>
</body>

</html>
