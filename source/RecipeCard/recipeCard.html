<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="recipeCard.js" type="module"></script>
    <script src="../LocalStorage/storage.js" type="module"></script>
    <title>Recipe Card</title>
</head>

<body>

    <!-- Top section layout: Create Recipe + Meal Builder side by side -->
    <div class="layout-wrapper">
        <!-- Left: Create Recipe -->
        <div class="form-column">
            <h1>Create a Recipe Card!</h1>

            <form id="new-recipe">
                <label for="name">
                    Recipe Name:
                    <input type="text" name="name" id="recipeName" placeholder="Recipe Name" required />
                </label>
                <label for="author">
                    Author:
                    <input type="text" name="author" id="authorName" placeholder="Author Name" required />
                </label>
                <label for="image">
                    Image:
                    <input type="file" name="image" id="image" accept="image/*" required />
                </label>
                <label for="tags">
                    Tags:
                    <select name="difficulty" id="tagsDropdown">
                        <option value="">Select a Tag</option>
                        <option value="Easy">Easy</option>
                        <option value="Advanced">Advanced</option>
                        <option value="Pro">Pro</option>
                    </select>
                    <input name="tags" id="customTag" placeholder="Custom Tag" />
                </label>
                <label for="ingredients">
                    Ingredients:
                    <textarea name="ingredients" id="ingredients" placeholder="Ingredients" required></textarea>
                </label>
                <label for="steps">
                    Steps:
                    <textarea name="steps" id="steps" placeholder="Recipe Steps" required></textarea>
                </label>
                <button type="submit">Create Recipe</button>
            </form>

            <search-bar>
                <input type="search" placeholder="Search" />
            </search-bar>
        </div>

        <!-- Right: Meal Builder -->
        <div class="meal-column">
            <section id="meal-builder">
                <h2>Create a Custom Meal</h2>
                <button id="start-meal-btn">Start Creating Meal</button>

                <!-- No new card container here — use existing cards -->
                <div id="meal-creator" style="display: none;">
                    <input type="text" id="meal-name" placeholder="Enter meal name" required />
                    <button id="save-meal-btn">Save Meal</button>
                </div>
            </section>

            <section id="meals-display">
                <h2>Meals</h2>
                <div id="meal-list"></div>
                <button id="show-all-btn">Show All Recipes</button>
            </section>
        </div>
    </div>

    <!-- Bottom: Recipe Cards (shown always, reused during meal selection) -->
    <main id="cardsContainer"></main>

</body>

</html>
